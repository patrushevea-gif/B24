<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B24 Task Dashboard Builder</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --accent: #14b8a6;
      --danger: #dc2626;
      --border: #e5e7eb;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #eef4ff, var(--bg));
      color: var(--text);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .title { margin: 0 0 8px; font-size: 30px; }
    .subtitle { margin: 0 0 20px; color: var(--muted); }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 18px;
    }

    .controls {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(12, 1fr);
      align-items: end;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; color: var(--muted); }

    input[type="text"], input[type="file"], select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      background: linear-gradient(135deg, var(--primary), #1d4ed8);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { opacity: 0.95; }
    .btn-secondary { background: linear-gradient(135deg, #0f766e, var(--accent)); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    .card .label { color: var(--muted); font-size: 12px; }
    .card .value { font-size: 26px; margin-top: 6px; font-weight: 700; }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .chart-box { min-height: 320px; }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      max-height: 460px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid #f1f5f9;
      text-align: left;
      padding: 8px;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
    }

    .hidden { display: none; }
    .row { display: grid; gap: 16px; grid-template-columns: 1.1fr 0.9fr; }

    .chip {
      display: inline-flex;
      align-items: center;
      background: #eff6ff;
      color: #1e3a8a;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      font-size: 12px;
      padding: 4px 8px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    @media (max-width: 1000px) {
      .controls { grid-template-columns: 1fr; }
      .grid-2, .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Автодашборд задач Битрикс24</h1>
    <p class="subtitle">Загрузите выгрузку задач и получите интерактивный управленческий обзор по направлению.</p>

    <section class="panel">
      <div class="controls">
        <div class="field" style="grid-column: span 5;">
          <label for="fileInput">Файл выгрузки задач (.xls/.html/.csv)</label>
          <input id="fileInput" type="file" accept=".xls,.html,.htm,.csv" />
        </div>
        <div class="field" style="grid-column: span 5;">
          <label for="directionInput">Название направления</label>
          <input id="directionInput" type="text" placeholder="Например: Продажи B2B" />
        </div>
        <div class="field" style="grid-column: span 2;">
          <button id="buildBtn">Сформировать</button>
        </div>
      </div>
      <p id="status" class="subtitle" style="margin-top:10px; margin-bottom:0;"></p>
    </section>

    <section id="dashboard" class="hidden">
      <section class="panel">
        <h2 id="dashboardTitle" style="margin-top:0;">Сводка</h2>
        <div id="metaChips"></div>
        <div class="cards" id="summaryCards"></div>
      </section>

      <section class="panel">
        <h3 style="margin-top:0;">Фильтры</h3>
        <div id="filters" class="filters"></div>
      </section>

      <section class="grid-2">
        <div class="panel chart-box"><canvas id="statusChart"></canvas></div>
        <div class="panel chart-box"><canvas id="projectChart"></canvas></div>
      </section>

      <section class="grid-2">
        <div class="panel chart-box"><canvas id="executorChart"></canvas></div>
        <div class="panel chart-box"><canvas id="timelineChart"></canvas></div>
      </section>

      <section class="panel row">
        <div>
          <h3 style="margin-top:0;">Структура по полю</h3>
          <div class="field" style="max-width:340px; margin-bottom:10px;">
            <label for="groupFieldSelect">Поле группировки</label>
            <select id="groupFieldSelect"></select>
          </div>
          <div class="table-wrap"><table id="groupTable"></table></div>
        </div>
        <div>
          <h3 style="margin-top:0;">Топ проблемных зон</h3>
          <div id="riskBlock"></div>
        </div>
      </section>

      <section class="panel">
        <h3 style="margin-top:0;">Полный перечень задач</h3>
        <div class="table-wrap"><table id="dataTable"></table></div>
      </section>
    </section>
  </div>

  <script>
    const dateFieldsHint = [
      'дата', 'срок', 'deadline', 'activity', 'актив', 'создан', 'измен', 'закры', 'начал', 'оконч'
    ];
    const peopleFieldsHint = ['исполнитель', 'постановщик', 'соисполн', 'наблюд', 'responsible', 'creator'];
    const statusFieldsHint = ['статус', 'status'];
    const projectFieldsHint = ['проект', 'project'];

    const state = {
      rows: [],
      headers: [],
      filteredRows: [],
      charts: {},
      lowCardinalityFields: [],
      filters: {}
    };

    const fileInput = document.getElementById('fileInput');
    const directionInput = document.getElementById('directionInput');
    const buildBtn = document.getElementById('buildBtn');
    const dashboard = document.getElementById('dashboard');
    const statusEl = document.getElementById('status');

    buildBtn.addEventListener('click', async () => {
      if (!fileInput.files[0]) {
        statusEl.textContent = 'Выберите файл перед построением дашборда.';
        return;
      }
      statusEl.textContent = 'Обработка файла...';
      try {
        const file = fileInput.files[0];
        const parsed = await parseInputFile(file);
        state.rows = parsed.rows;
        state.headers = parsed.headers;
        if (!state.rows.length) throw new Error('В файле не найдено строк с задачами.');

        state.lowCardinalityFields = state.headers.filter((h) => {
          const unique = new Set(state.rows.map((r) => normalizeCell(r[h])).filter(Boolean));
          return unique.size > 1 && unique.size <= 35;
        });

        buildFilters();
        applyFiltersAndRender();
        dashboard.classList.remove('hidden');
        statusEl.textContent = `Готово: ${state.rows.length} задач, ${state.headers.length} полей обработано.`;
      } catch (e) {
        console.error(e);
        statusEl.textContent = 'Ошибка обработки файла: ' + e.message;
      }
    });

    async function parseInputFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      const buffer = await file.arrayBuffer();

      if (ext === 'csv') {
        const text = decodeText(buffer);
        return parseCsv(text);
      }

      const text = decodeText(buffer);
      if (text.includes('<table') || text.includes('<TABLE')) {
        return parseHtmlTable(text);
      }
      return parseCsv(text);
    }

    function decodeText(buffer) {
      const utf = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
      if ((utf.match(/�/g) || []).length > 5) {
        return new TextDecoder('windows-1251', { fatal: false }).decode(buffer);
      }
      return utf;
    }

    function parseHtmlTable(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const table = doc.querySelector('table');
      if (!table) throw new Error('HTML-таблица в файле не найдена.');
      const trs = Array.from(table.querySelectorAll('tr')).filter((tr) => tr.querySelectorAll('td,th').length);
      if (trs.length < 2) throw new Error('Недостаточно строк для анализа.');

      const headers = Array.from(trs[0].querySelectorAll('th,td')).map((x, i) => normalizeCell(x.textContent) || `Поле_${i + 1}`);
      const rows = [];
      for (let i = 1; i < trs.length; i++) {
        const cells = Array.from(trs[i].querySelectorAll('td,th'));
        if (!cells.length) continue;
        const obj = {};
        headers.forEach((h, idx) => {
          obj[h] = normalizeCell(cells[idx]?.textContent || '');
        });
        rows.push(obj);
      }
      return { headers, rows };
    }

    function parseCsv(text) {
      const lines = text.split(/\r?\n/).filter(Boolean);
      const delim = [',', ';', '\t'].sort((a, b) => (lines[0].split(b).length - lines[0].split(a).length))[0];
      const headers = lines[0].split(delim).map((h, i) => normalizeCell(h) || `Поле_${i + 1}`);
      const rows = lines.slice(1).map((line) => {
        const parts = line.split(delim);
        const obj = {};
        headers.forEach((h, i) => obj[h] = normalizeCell(parts[i] || ''));
        return obj;
      });
      return { headers, rows };
    }

    function normalizeCell(v) {
      return String(v ?? '').replace(/\s+/g, ' ').replace(/^\s+|\s+$/g, '');
    }

    function buildFilters() {
      const root = document.getElementById('filters');
      root.innerHTML = '';
      state.filters = {};

      state.lowCardinalityFields.slice(0, 10).forEach((field) => {
        const values = Array.from(new Set(state.rows.map((r) => r[field]).filter(Boolean))).sort();
        const wrap = document.createElement('div');
        wrap.className = 'field';
        wrap.innerHTML = `<label>${field}</label>`;
        const select = document.createElement('select');
        select.innerHTML = `<option value="">Все</option>` + values.map((v) => `<option>${escapeHtml(v)}</option>`).join('');
        select.addEventListener('change', () => {
          state.filters[field] = select.value;
          applyFiltersAndRender();
        });
        wrap.appendChild(select);
        root.appendChild(wrap);
      });
    }

    function applyFiltersAndRender() {
      state.filteredRows = state.rows.filter((row) => {
        return Object.entries(state.filters).every(([f, val]) => !val || row[f] === val);
      });
      renderAll();
    }

    function renderAll() {
      const direction = directionInput.value.trim() || 'Без названия';
      document.getElementById('dashboardTitle').textContent = `Сводка направления: ${direction}`;

      renderSummaryCards();
      renderMeta();
      renderCharts();
      renderGroupTable();
      renderRiskBlock();
      renderDataTable();
      buildGroupSelector();
    }

    function findField(hints) {
      const low = state.headers.map((h) => h.toLowerCase());
      const idx = low.findIndex((h) => hints.some((x) => h.includes(x)));
      return idx >= 0 ? state.headers[idx] : null;
    }

    function parseDateAny(s) {
      if (!s) return null;
      const direct = new Date(s);
      if (!isNaN(direct)) return direct;
      const m = String(s).match(/(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})(?:\s+(\d{1,2}):(\d{2}))?/);
      if (!m) return null;
      const y = Number(m[3].length === 2 ? '20' + m[3] : m[3]);
      return new Date(y, Number(m[2]) - 1, Number(m[1]), Number(m[4] || 0), Number(m[5] || 0));
    }

    function isDone(row) {
      const statusField = findField(statusFieldsHint);
      if (!statusField) return false;
      const v = (row[statusField] || '').toLowerCase();
      return ['заверш', 'closed', 'done', 'completed', 'выполн'].some((x) => v.includes(x));
    }

    function renderSummaryCards() {
      const rows = state.filteredRows;
      const projectField = findField(projectFieldsHint);
      const statusField = findField(statusFieldsHint);
      const executorField = findField(['исполнитель', 'responsible']);
      const deadlineField = findField(['крайний срок', 'deadline', 'планируемая дата окончания']);
      const activityField = findField(['последняя активность', 'activity']);

      const total = rows.length;
      const projects = projectField ? new Set(rows.map((r) => r[projectField]).filter(Boolean)).size : 0;
      const done = rows.filter(isDone).length;
      const activeExecutors = executorField ? new Set(rows.map((r) => r[executorField]).filter(Boolean)).size : 0;
      const overdue = deadlineField ? rows.filter((r) => {
        const d = parseDateAny(r[deadlineField]);
        return d && d < new Date() && !isDone(r);
      }).length : 0;
      const hot7 = activityField ? rows.filter((r) => {
        const d = parseDateAny(r[activityField]);
        return d && (Date.now() - d.getTime()) <= 7 * 86400000;
      }).length : 0;

      const cards = [
        ['Всего задач', total],
        ['Проектов', projects],
        ['Исполнителей', activeExecutors],
        ['Завершено', done],
        ['Просрочено', overdue],
        ['Активность за 7 дней', hot7]
      ];

      document.getElementById('summaryCards').innerHTML = cards.map(([k, v]) =>
        `<div class="card"><div class="label">${k}</div><div class="value">${v}</div></div>`
      ).join('');

      if (statusField) {
        const byStatus = counter(rows, statusField);
        const topStatus = Object.entries(byStatus).sort((a, b) => b[1] - a[1]).slice(0, 3)
          .map(([k, v]) => `${k}: ${v}`).join(' • ');
        document.getElementById('status').textContent += ` | Топ статусы: ${topStatus}`;
      }
    }

    function renderMeta() {
      const chips = [];
      chips.push(`Показано задач: ${state.filteredRows.length} из ${state.rows.length}`);
      chips.push(`Поля в источнике: ${state.headers.length}`);
      const projField = findField(projectFieldsHint);
      if (projField) chips.push(`Поле проектов: ${projField}`);
      const statusField = findField(statusFieldsHint);
      if (statusField) chips.push(`Поле статусов: ${statusField}`);

      document.getElementById('metaChips').innerHTML = chips.map((c) => `<span class="chip">${c}</span>`).join('');
    }

    function counter(rows, field) {
      const m = {};
      rows.forEach((r) => {
        const key = r[field] || '(пусто)';
        m[key] = (m[key] || 0) + 1;
      });
      return m;
    }

    function topEntries(obj, n = 10) {
      return Object.entries(obj).sort((a, b) => b[1] - a[1]).slice(0, n);
    }

    function renderCharts() {
      const rows = state.filteredRows;
      const statusField = findField(statusFieldsHint) || state.lowCardinalityFields[0] || state.headers[0];
      const projectField = findField(projectFieldsHint) || state.lowCardinalityFields[1] || state.headers[1];
      const execField = findField(['исполнитель', 'responsible']) || state.lowCardinalityFields[2] || state.headers[2];
      const timelineField = findField(['дата создания', 'крайний срок', 'последняя активность']) || state.headers[0];

      makeChart('statusChart', 'doughnut', topEntries(counter(rows, statusField), 12), `Распределение по: ${statusField}`);
      makeChart('projectChart', 'bar', topEntries(counter(rows, projectField), 10), `Топ проектов: ${projectField}`);
      makeChart('executorChart', 'bar', topEntries(counter(rows, execField), 12), `Нагрузка по: ${execField}`);

      const monthly = {};
      rows.forEach((r) => {
        const d = parseDateAny(r[timelineField]);
        if (!d) return;
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        monthly[key] = (monthly[key] || 0) + 1;
      });
      makeChart('timelineChart', 'line', Object.entries(monthly).sort((a, b) => a[0].localeCompare(b[0])), `Динамика по дате: ${timelineField}`);
    }

    function makeChart(id, type, dataEntries, title) {
      const ctx = document.getElementById(id);
      if (!ctx) return;
      if (state.charts[id]) state.charts[id].destroy();
      const labels = dataEntries.map((x) => x[0]);
      const values = dataEntries.map((x) => x[1]);
      state.charts[id] = new Chart(ctx, {
        type,
        data: {
          labels,
          datasets: [{
            label: 'Задач',
            data: values,
            borderWidth: 1,
            backgroundColor: labels.map((_, i) => `hsl(${(i * 37) % 360} 72% 55% / 0.72)`),
            borderColor: labels.map((_, i) => `hsl(${(i * 37) % 360} 72% 45%)`),
            tension: 0.25
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: type !== 'bar' },
            title: { display: true, text: title }
          },
          scales: type === 'doughnut' ? {} : {
            x: { ticks: { maxRotation: 45, minRotation: 10 } },
            y: { beginAtZero: true }
          }
        }
      });
    }

    function buildGroupSelector() {
      const select = document.getElementById('groupFieldSelect');
      const current = select.value;
      const options = state.headers.map((h) => `<option ${h === current ? 'selected' : ''}>${escapeHtml(h)}</option>`).join('');
      select.innerHTML = options;
      if (!select.dataset.bound) {
        select.addEventListener('change', renderGroupTable);
        select.dataset.bound = '1';
      }
    }

    function renderGroupTable() {
      const field = document.getElementById('groupFieldSelect').value || state.headers[0];
      if (!field) return;
      const rows = topEntries(counter(state.filteredRows, field), 50);
      const html = ['<tr><th>Значение</th><th>Количество задач</th><th>Доля</th></tr>'];
      rows.forEach(([k, v]) => {
        const p = state.filteredRows.length ? (v / state.filteredRows.length * 100).toFixed(1) : '0.0';
        html.push(`<tr><td>${escapeHtml(k)}</td><td>${v}</td><td>${p}%</td></tr>`);
      });
      document.getElementById('groupTable').innerHTML = html.join('');
    }

    function renderRiskBlock() {
      const deadlineField = findField(['крайний срок', 'deadline', 'планируемая дата окончания']);
      const executorField = findField(['исполнитель', 'responsible']) || state.headers[0];
      const riskEl = document.getElementById('riskBlock');
      if (!deadlineField) {
        riskEl.innerHTML = '<p>В данных нет поля сроков — блок рисков ограничен.</p>';
        return;
      }

      const overdue = state.filteredRows.filter((r) => {
        const d = parseDateAny(r[deadlineField]);
        return d && d < new Date() && !isDone(r);
      });
      const byOwner = topEntries(counter(overdue, executorField), 8);
      riskEl.innerHTML = `
        <p><b>Просроченных задач:</b> ${overdue.length}</p>
        <p><b>Наибольшая концентрация просрочек:</b></p>
        <ul>${byOwner.map(([k, v]) => `<li>${escapeHtml(k)} — ${v}</li>`).join('')}</ul>
      `;
    }

    function renderDataTable() {
      const headers = state.headers;
      const rows = state.filteredRows.slice(0, 500);
      const out = ['<tr>' + headers.map((h) => `<th>${escapeHtml(h)}</th>`).join('') + '</tr>'];
      rows.forEach((r) => {
        out.push('<tr>' + headers.map((h) => `<td>${escapeHtml(r[h] || '')}</td>`).join('') + '</tr>');
      });
      document.getElementById('dataTable').innerHTML = out.join('');
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
  </script>
</body>
</html>
